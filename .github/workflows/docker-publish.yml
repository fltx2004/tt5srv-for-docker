name: Publish Docker image

on:
  push:
    branches:
      - main
    paths:
      - version.json
      - Dockerfile
      - .dockerignore
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tt5srv-docker-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read release configuration
        id: release
        shell: bash
        run: |
          set -euo pipefail

          version="$(jq -r '.version // empty' version.json)"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "version.json must contain a version such as 5.22." >&2
            exit 1
          fi

          download_url="https://bearware.dk/teamtalk/v${version}/teamtalk-v${version}-ubuntu24-x86_64.tgz"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "download_url=${download_url}" >> "$GITHUB_OUTPUT"
          echo "TeamTalk release: ${version}"
          echo "Download URL: ${download_url}"

      - name: Download TeamTalk server
        id: binary
        shell: bash
        env:
          DOWNLOAD_URL: ${{ steps.release.outputs.download_url }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail

          archive="$RUNNER_TEMP/teamtalk.tgz"
          extract_dir="$RUNNER_TEMP/teamtalk"
          archive_root="teamtalk-v${VERSION}-ubuntu24-x86_64"
          server_file="${archive_root}/server/tt5srv"
          mkdir -p "$extract_dir"

          curl \
            --fail \
            --location \
            --retry 3 \
            --retry-all-errors \
            --output "$archive" \
            "$DOWNLOAD_URL"

          archive_listing="$(tar -tzf "$archive")"

          if ! grep -Fxq "$server_file" <<< "$archive_listing"; then
            echo "The archive does not contain the expected file: ${server_file}" >&2
            exit 1
          fi

          tar -xzf "$archive" -C "$extract_dir" "$server_file"
          install -m 0755 "$extract_dir/$server_file" ./tt5srv

          file_output="$(file tt5srv)"
          echo "$file_output"

          if [[ "$file_output" != *"x86-64"* ]]; then
            echo "Downloaded tt5srv is not a Linux x86-64 executable." >&2
            exit 1
          fi

          echo "sha256=$(sha256sum tt5srv | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tt5srv:${{ steps.release.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tt5srv:latest
          labels: |
            org.opencontainers.image.title=TeamTalk 5 Server
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            io.teamtalk.download-url=${{ steps.release.outputs.download_url }}
            io.teamtalk.binary-sha256=${{ steps.binary.outputs.sha256 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
